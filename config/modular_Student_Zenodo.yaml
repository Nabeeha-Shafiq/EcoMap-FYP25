# =============================================================================
# MODULAR STUDENT MODEL CONFIGURATION - H&E MORPHOLOGY ONLY (ZENODO Dataset)
# =============================================================================
#
# PURPOSE:
#   Train morphology-only student for ZENODO dataset (external validation).
#   Mirrors GEO student config but with ZENODO-specific paths.
#
# KEY POINTS:
#   - Same student architecture as GEO
#   - Different data (16,639 samples vs 23,342 for GEO)
#   - Teacher accuracy baseline: ~86% (vs 93% for GEO)
#   - Expected student accuracy: ~50-65%
#
# =============================================================================

# Dataset Metadata
dataset:
  name: "ZENODO Student Model - Morphology Only"
  n_samples: null
  n_classes: 5
  class_names:
    - "Fibrotic"
    - "Immunosuppressive"
    - "Invasive_Border"
    - "Metabolic"
    - "Normal_Adjacent"
  description: "Student: H&E morphology only via distillation on ZENODO data"

# Input Data Paths (ZENODO DATASET)
input_dataset:
  labels_file: "./ZENODO data/barcode_labels.csv"
  metadata_file: "./ZENODO data/barcode_metadata.csv"
  label_mapping_file: "./ZENODO data/label_mapping.json"
  image_encoder_embeddings: "./ZENODO data/UNI_EMBEDDINGS_COMBINED.CSV"

# Embedding Modalities (UNI ONLY)
embeddings:
  image_encoder:
    name: "Image Encoder (UNI)"
    file_path: "./ZENODO data/UNI_EMBEDDINGS_COMBINED.CSV"
    pca_variance: 0.6  # MUST match teacher
    description: "Morphology features (H&E only)"

# Preprocessing
preprocessing:
  remove_nan_rows: false
  remove_inf_rows: true
  nan_tolerance_percent: 0.5
  normalize_before_pca: false
  normalization_method: "standard"
  save_pca_models: true
  save_preprocessed_arrays: true

# Student Training Configuration
training:
  hidden_dims: [128, 64, 32]
  learning_rate: 0.001
  batch_size: 32
  n_epochs: 150
  weight_decay: 1e-5
  dropout_rate: 0.3
  use_batch_norm: true
  use_class_weights: true
  early_stopping_patience: 15
  validation_split: 0.2
  n_folds: 5
  random_seed: 42

# Knowledge Distillation Parameters
distillation:
  teacher_model_path: "./ZENODO Ablation Study/TEACHER_FINAL_0.6_PCA/teacher_model_ENSEMBLE.pt"
  teacher_preprocessed_dir: "./ZENODO Ablation Study/TEACHER_FINAL_0.6_PCA/.working/preprocessed_arrays"
  teacher_baseline_accuracy: 0.86
  
  alpha: 0.7        # Hard target
  beta: 0.2         # Soft target
  gamma: 0.1        # Feature matching
  temperature: 4.0  # Softness

# Output Configuration
output:
  output_dir: "./ZENODO Ablation Study/STUDENT_DISTILLATION_0.6_PCA"
  create_subdirs:
    - "preprocessing"
    - "training/models"
    - "training/metrics"
    - "training/visualizations"
    - "post-training/visualizations"
    - "post-training/metrics"

# Logging
logging:
  level: "INFO"
  save_log: true
  log_file: "student_training.log"
