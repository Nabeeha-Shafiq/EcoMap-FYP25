# =============================================================================
# MODULAR STUDENT MODEL CONFIGURATION - H&E MORPHOLOGY ONLY (GEO Dataset)
# =============================================================================
#
# PURPOSE: 
#   Train morphology-only (UNI embeddings) student model via knowledge distillation
#   from multimodal teacher. Integrated with unified pipeline orchestration.
#
# KEY FEATURES:
#   - Input: UNI (image encoder) ONLY - H&E morphology
#   - Teacher: Multimodal (UNI + scVI + RCTD) ~93% accuracy
#   - Distillation: Hard + soft targets + feature matching
#   - Output: 5 ecotype classes (same as teacher)
#   - Modular: Same config format as teacher pipeline
#
# DESIGN PHILOSOPHY:
#   Same structure as teacher config but:
#   - Different INPUT (UNI only vs multimodal)
#   - Different OUTPUT_DIR (student/ subdirectory)
#   - Teacher model dependency specified
#   - Distillation hyperparameters configured
#
# =============================================================================

# Dataset Metadata
dataset:
  name: "GEO Student Model - Morphology Only"
  n_samples: null
  n_classes: 5
  class_names:
    - "Fibrotic"
    - "Immunosuppressive"
    - "Invasive_Border"
    - "Metabolic"
    - "Normal_Adjacent"
  description: "Student: H&E morphology only via distillation from multimodal teacher"

# Input Data Paths
input_dataset:
  labels_file: "./GEO data/input_dataset/barcode_labels.csv"
  metadata_file: "./GEO data/input_dataset/barcode_metadata.csv"
  label_mapping_file: "./GEO data/input_dataset/label_mapping.json"
  image_encoder_embeddings: "./GEO data/input_dataset/uni_embeddings_1024d_combined.csv"

# Embedding Modalities (UNI ONLY - no scVI, no RCTD)
embeddings:
  image_encoder:
    name: "Image Encoder (UNI)"
    file_path: "./GEO data/input_dataset/uni_embeddings_1024d_combined.csv"
    pca_variance: 0.6  # MUST match teacher
    description: "Morphology features (H&E only)"

# Preprocessing
preprocessing:
  remove_nan_rows: false
  remove_inf_rows: true
  nan_tolerance_percent: 0.5
  normalize_before_pca: false
  normalization_method: "standard"
  save_pca_models: true
  save_preprocessed_arrays: true

# Student Training Configuration
training:
  hidden_dims: [128, 64, 32]  # Smaller than teacher (morphology only)
  learning_rate: 0.001
  batch_size: 32
  n_epochs: 150
  weight_decay: 1e-5
  dropout_rate: 0.3
  use_batch_norm: true
  use_class_weights: true
  early_stopping_patience: 15
  validation_split: 0.2
  n_folds: 5
  random_seed: 42

# Knowledge Distillation Parameters
distillation:
  teacher_model_path: "./GEO Ablation Study/TEACHER_FINAL_0.6_PCA/teacher_model_FROZEN.pt"
  teacher_preprocessed_dir: "./GEO Ablation Study/TEACHER_FINAL_0.6_PCA/.working/preprocessed_arrays"
  teacher_baseline_accuracy: 0.9396
  
  alpha: 0.7        # Hard target (true labels)
  beta: 0.2         # Soft target (teacher imitation)
  gamma: 0.1        # Feature matching
  temperature: 4.0  # Softness

# Output Configuration
output:
  output_dir: "./GEO Ablation Study/STUDENT_DISTILLATION_0.6_PCA"
  create_subdirs:
    - "preprocessing"
    - "training/models"
    - "training/metrics"
    - "training/visualizations"
    - "post-training/visualizations"
    - "post-training/metrics"

# Logging
logging:
  level: "INFO"
  save_log: true
  log_file: "student_training.log"
