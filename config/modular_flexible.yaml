# =============================================================================
# MODULAR PIPELINE CONFIGURATION - FLEXIBLE PCA VARIANCE PERCENTAGES
# =============================================================================
#
# PURPOSE: Single configuration file for entire end-to-end pipeline
# 
# PIPELINE FLOW (All automated by changing input CSVs + config):
#   1. Load embeddings from input CSVs
#   2. Apply per-patient PCA reduction (configured below)
#   3. Concatenate (fuse) all modalities
#   4. Generate pre-training visualizations & statistics
#   5. Train MLP classifier (5-fold cross-validation)
#   6. Generate training curves & confusion matrices
#   7. Generate post-training visualizations & spatial heatmaps
#   8. Save all results & metrics
#
# MODULAR PHILOSOPHY:
#   - Input: Any CSV files following INPUT_FORMAT_SPECIFICATION.md
#   - Config: Only this file changes for different datasets/ablations
#   - Output: Automatic visualizations & metrics in output_dir
#   - Black Box: Pipeline handles preprocessing → training → visualization
#
# =============================================================================

# =============================================================================
# [1] DATASET METADATA
# =============================================================================
dataset:
  name: "MY_DATASET"                  # e.g., "GEO_23342", "ZENODO_16639"
  n_samples: null                     # Auto-detect from input CSVs
  n_classes: 5
  class_names:
    - "Fibrotic"
    - "Immunosuppressive"
    - "Invasive_Border"
    - "Metabolic"
    - "Normal_Adjacent"
  description: "Your dataset description"

# =============================================================================
# [2] INPUT DATA PATHS (Follow INPUT_FORMAT_SPECIFICATION.md)
# =============================================================================
# All paths are RELATIVE to where you run the pipeline command
# Example: if you run from /home/user/project/, then:
#   ./data/input_dataset/image_encoder_embeddings.csv
#   means: /home/user/project/data/input_dataset/image_encoder_embeddings.csv

input_dataset:
  # Labels and Metadata (REQUIRED)
  labels_file: "./data/input_dataset/barcode_labels.csv"
  metadata_file: "./data/input_dataset/barcode_metadata.csv"
  label_mapping_file: "./data/input_dataset/label_mapping.json"
  
  # Embedding CSVs (REQUIRED - all must exist)
  image_encoder_embeddings: "./data/input_dataset/image_encoder_embeddings.csv"
  gene_embeddings: "./data/input_dataset/gene_embeddings.csv"
  cell_composition_embeddings: "./data/input_dataset/cell_composition_embeddings.csv"

# =============================================================================
# [3] EMBEDDING MODALITIES WITH FLEXIBLE PCA CONFIGURATION
# =============================================================================
# KEY PRINCIPLE: No hard-coded dimensions!
#   - Input CSVs provide RAW embeddings (any size: 150D, 1024D, 2000D, etc.)
#   - PCA reduction is OPTIONAL and CONFIGURABLE below
#
# PCA Options:
#   1. pca_variance: 0.95    → Keep 95% of variance (RECOMMENDED)
#   2. pca_variance: 0.98    → Keep 98% of variance (tighter bound)
#   3. pca_variance: null    → NO PCA, use raw embeddings
#
# Method:
#   - Each modality's PCA is applied PER-PATIENT independently
#   - Maintains spatial structure within each patient
#   - Results are concatenated across patients

embeddings:
  # Image Morphology Encoder (e.g., UNI Foundation Model)
  # Raw input: 1024D in CSV
  # Output: depends on pca_variance
  image_encoder:
    name: "Image Encoder (UNI)"
    file_path: "./data/input_dataset/image_encoder_embeddings.csv"
    pca_variance: 0.95              # Keep 95% variance (typically ~150D)
    description: "Morphological features from image foundation model (e.g., UNI)"
  
  # Gene Expression Encoder (e.g., scVI Latent Space)
  # Raw input: 128D in CSV
  # No PCA needed: 128D is already reduced
  gene_encoder:
    name: "Gene Encoder (scVI)"
    file_path: "./data/input_dataset/gene_embeddings.csv"
    pca_variance: null              # No reduction (keep 128D as-is)
    description: "Gene expression from scVI latent space"
  
  # Cell Composition Encoder (e.g., RCTD Proportions)
  # Raw input: 25D in CSV
  # No PCA needed: already sparse biological constraints
  cell_encoder:
    name: "Cell Composition (RCTD)"
    file_path: "./data/input_dataset/cell_composition_embeddings.csv"
    pca_variance: null              # No reduction (keep 25D as-is)
    description: "Cell composition proportions from RCTD"

# =============================================================================
# [4] PREPROCESSING CONFIGURATION
# =============================================================================
preprocessing:
  # Data quality control
  remove_nan_rows: false            # Keep rows with NaN (set to true to remove)
  remove_inf_rows: true             # Remove rows with Inf values
  nan_tolerance_percent: 0.5        # Allow up to 0.5% NaN per modality
  
  # Normalization (applied before PCA)
  normalize_before_pca: false       # Normalize each modality before PCA
  normalization_method: "standard"  # "standard" (z-score) or "minmax"
  
  # Output options
  save_pca_models: true             # Save PCA transformers for inference
  save_preprocessed_arrays: true    # Save intermediate NumPy arrays

# =============================================================================
# [5] TRAINING CONFIGURATION
# =============================================================================
training:
  # Model Architecture
  # Input dim: auto-calculated from concatenated embeddings (no hard-coding)
  # Output dim: n_classes (5 in this case)
  hidden_dims: [256, 128, 64]       # Hidden layers: 303D → 256 → 128 → 64 → 5
  
  # Optimization
  learning_rate: 0.001
  batch_size: 32
  n_epochs: 200
  weight_decay: 1e-5
  
  # Regularization
  dropout_rate: 0.3
  use_batch_norm: true              # Batch normalization in hidden layers
  use_class_weights: true           # Balance imbalanced classes
  
  # Early Stopping
  early_stopping_patience: 20
  validation_split: 0.2             # 20% validation set per fold
  
  # Cross-Validation
  n_folds: 5                        # 5-fold stratified cross-validation
  random_seed: 42                   # Fixed seed for reproducibility

# =============================================================================
# [6] VISUALIZATION CONFIGURATION
# =============================================================================
visualization:
  # Pre-training visualizations
  generate_pretrain_pca: true       # PCA projections of each modality
  generate_pretrain_corr: true      # Correlation matrix between modalities
  generate_pretrain_umap: true      # UMAP projections (optional, slow)
  
  # Post-training visualizations
  generate_confusion_matrix: true   # Confusion matrix plot
  generate_training_curves: true    # Loss/accuracy curves per fold
  generate_per_class_accuracy: true # Bar plot of per-class accuracy
  generate_metrics_summary: true    # Overall metrics visualization
  generate_fold_comparison: true    # Fold-to-fold comparison
  
  # Spatial visualizations (requires barcode_metadata.csv with coordinates)
  generate_spatial_maps: true       # Spatial ecotype heatmaps per patient
  generate_confidence_heatmaps: true # Confidence score heatmaps per patient
  generate_3d_landscapes: true      # 3D landscape plots (confidence as Z-axis)
  
  # Output formats
  output_format: ["png", "pdf"]     # Save in multiple formats (adds ~2x space)
  dpi: 300                          # Resolution for PNG/PDF (300 = publication quality)

# =============================================================================
# [7] VALIDATION & QUALITY CONTROL
# =============================================================================
validation:
  # Barcode alignment checks
  barcode_alignment_required: true  # All CSVs must have same barcodes/order
  barcode_check_patient_prefix: true # Verify patient_id prefix matches
  
  # Data quality checks
  check_nan: true                   # Report NaN statistics
  check_inf: true                   # Check for infinite values
  check_zero_columns: true          # Warn about all-zero columns
  check_variance: true              # Warn about low-variance embeddings
  
  # Cross-modality checks
  check_correlation: true           # Compute inter-modality correlation
  
  # Output
  save_validation_report: true      # Save QC report to HTML + JSON

# =============================================================================
# [8] OUTPUT CONFIGURATION
# =============================================================================
output:
  output_dir: "./results_test_end_end_part2"           # Root output directory
  overwrite_existing: true          # Overwrite if results_dir already exists
  
  # Sub-directories (created automatically)
  # results/
  # ├── preprocessing/              (PCA models, arrays, reports)
  # ├── training/                   (model checkpoint, metrics, curves)
  # ├── predictions/                (predictions.csv with confidence)
  # ├── visualizations/
  # │   ├── pretrain/              (PCA, UMAP, correlation)
  # │   ├── training/              (confusion matrix, curves)
  # │   └── spatial/               (patient-specific heatmaps, 3D plots)
  # └── metadata/                  (config, validation report, hyperparams)
  
  # Logging
  log_level: "INFO"                 # "DEBUG", "INFO", "WARNING", "ERROR"
  save_logs: true                   # Save complete log to file

# =============================================================================
# [9] ABLATION STUDY CONFIGURATION (Optional)
# =============================================================================
# For systematic ablation studies, modify the output_dir to include ablation name:
#
# Example ablations:
#   1. Single modality: 
#      - Disable: gene_encoder (set pca_variance: null, comment out)
#      - output_dir: ./results/ablation_uni_only
#   
#   2. Different PCA:
#      - image_encoder.pca_variance: 0.98
#      - output_dir: ./results/ablation_pca_98
#   
#   3. Different architecture:
#      - hidden_dims: [512, 256, 128]
#      - output_dir: ./results/ablation_larger_model
#
# The pipeline auto-generates meaningful names but you can override above

ablation:
  name: null                        # e.g., "uni_only", "scvi_cconly", "pca_98"
  description: null                 # Short description of ablation

# =============================================================================
# [10] ADVANCED OPTIONS (Leave as default unless you know what you're doing)
# =============================================================================
advanced:
  # Device selection
  device: "cuda"                    # "cuda" (GPU) or "cpu" (slower)
  
  # Numerical stability
  gradient_clipping: 1.0            # Clip gradients to prevent explosion
  mixed_precision: false            # Use mixed precision training (faster, less precise)
  
  # Memory optimization
  accumulation_steps: 1             # Gradient accumulation steps (>1 = lower memory)
  pin_memory: true                  # Pin memory for faster GPU transfer
  num_workers: 4                    # DataLoader workers (increase for faster loading)
  
  # Model checkpointing
  save_best_model: true             # Save model with best validation accuracy
  save_all_folds: true              # Save all 5 fold models
  
  # Reproducibility
  deterministic_mode: true          # Ensure exact reproducibility (slower)
  set_torch_seed: true              # Fix torch random seed
  set_numpy_seed: true              # Fix numpy random seed

# =============================================================================
# [11] EXAMPLE CONFIGURATIONS FOR COMMON SCENARIOS
# =============================================================================
#
# SCENARIO 1: Default (all modalities, standard PCA)
# ─────────────────────────────────────────────────
# Just use the defaults above
#
#
# SCENARIO 2: Image only (UNI embeddings only)
# ─────────────────────────────────────────────
# Comment out in section [3]:
#   # gene_encoder:
#   # cell_encoder:
#
#
# SCENARIO 3: All modalities, no PCA
# ──────────────────────────────────
# In section [3], set:
#   image_encoder.pca_variance: null
#   gene_encoder.pca_variance: null
#   cell_encoder.pca_variance: null
#
#
# SCENARIO 4: Tighter PCA (98% variance instead of 95%)
# ──────────────────────────────────────────────────────
# In section [3], set:
#   image_encoder.pca_variance: 0.98
#
#
# SCENARIO 5: High-resolution embeddings (e.g., 2000D image encoder)
# ──────────────────────────────────────────────────────────────────
# Just provide the larger CSV, no changes to config!
# Pipeline auto-detects dimensions
#
# =============================================================================

# =============================================================================
# QUICK START COMMAND
# =============================================================================
#
# Once you've prepared your input data and saved this config as my_config.yaml:
#
#   python pipeline/main.py --config my_config.yaml
#
# Or with overrides:
#
#   python pipeline/main.py \
#       --config my_config.yaml \
#       --output_dir ./results_v2 \
#       --no_visualizations
#
# =============================================================================
